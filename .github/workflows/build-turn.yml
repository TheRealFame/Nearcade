name: Build Custom TURN Server

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nearcade-turn-linux-amd64
            asset_name: nearcade-turn-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nearcade-turn-windows-amd64.exe
            asset_name: nearcade-turn-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: nearcade-turn-macos-amd64
            asset_name: nearcade-turn-macos-amd64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Release
      run: cargo build --release --manifest-path server/Cargo.toml --target ${{ matrix.target }}

    - name: Prepare Artifact
      shell: bash
      run: |
        mkdir -p dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp server/target/${{ matrix.target }}/release/nearcade-turn.exe dist/${{ matrix.artifact_name }}
        else
          cp server/target/${{ matrix.target }}/release/nearcade-turn dist/${{ matrix.artifact_name }}
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release Placeholder
        run: echo "This step would create a release or upload to a server."
